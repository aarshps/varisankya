name: Android Build & Lint

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Generate placeholder google-services.json (if missing)
        run: |
          CONFIG="app/google-services.json"
          if [ ! -f "$CONFIG" ]; then
            echo "::warning::Using placeholder Firebase config — sign-in and Firestore won't work in this build."
            cat > "$CONFIG" <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "varisankya-placeholder",
              "storage_bucket": "varisankya-placeholder.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:placeholder",
                "android_client_info": { "package_name": "com.hora.varisankya" }
              },
              "oauth_client": [{
                "client_id": "000000000000-placeholder.apps.googleusercontent.com",
                "client_type": 3
              }],
              "api_key": [{ "current_key": "placeholder" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Lint
        run: ./gradlew lint --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload unit test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: android/app/build/reports/tests/
          retention-days: 7

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
