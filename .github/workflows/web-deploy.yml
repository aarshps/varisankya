name: Deploy Web to Vercel

# Auto-deploy the web/ app on every push to main (Production) and every PR
# (Preview). Uses the Vercel CLI with a token rather than the Vercel<->GitHub
# native integration. We deploy from the web/ subdirectory and let Vercel build
# remotely so the project's environment variables (NEXT_PUBLIC_FIREBASE_*) are
# injected at build time — these are inlined into the client bundle, so they
# MUST be present during the build.
#
# Required repo config (set on aarshps/varisankya):
#   - secret   VERCEL_TOKEN       (Vercel account/team token)
#   - variable VERCEL_ORG_ID      (team id, team_…)
#   - variable VERCEL_PROJECT_ID  (project id, prj_… — the existing web project)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web-deploy.yml"

# One in-flight deploy per ref; cancel superseded runs.
concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Production — push to main. Builds remotely on Vercel with the project's
      # Production environment variables.
      - name: Deploy Production
        if: github.event_name == 'push'
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      # Preview — pull requests. Uses the project's Preview environment vars.
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        run: vercel deploy --yes --token="$VERCEL_TOKEN"
