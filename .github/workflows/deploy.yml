name: Deploy to Vercel

# Auto-deploy on every push to main (Production) and every PR (Preview).
# Uses the Vercel CLI with a token rather than the Vercel↔GitHub native
# integration. Required repo config:
#   - secret  VERCEL_TOKEN       (Vercel account/team token)
#   - variable VERCEL_ORG_ID     (team id, team_…)
#   - variable VERCEL_PROJECT_ID (project id, prj_…)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One in-flight deploy per ref; cancel superseded runs.
concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ---- Production (push to main) ----
      - name: Deploy Production
        if: github.event_name == 'push'
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # ---- Preview (pull requests) ----
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        run: |
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
